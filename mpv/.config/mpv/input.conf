# ~/.config/mpv/input.conf

###################################################
#MBTN_LEFT     ignore              # don't do anything
#MBTN_LEFT_DBL cycle fullscreen    # toggle fullscreen
#MBTN_RIGHT    cycle pause         # toggle pause/playback mode
MBTN_BACK repeatable playlist-prev       # skip to the previous file
MBTN_FORWARD repeatable playlist-next       # skip to the next file

MBTN_LEFT script-binding drag-to-pan # pan around the clicked point
# Original mpv drag-to-pan binding
# MBTN_LEFT script-binding positioning/drag-to-pan # pan around the clicked point


UP repeatable add volume 2
DOWN repeatable add volume -2
LEFT  no-osd seek -2 exact       # seek exactly 1 second backward
RIGHT no-osd seek  2 exact       # seek exactly 1 second forward
Shift+LEFT    no-osd seek 5 exact       # seek exactly 5 seconds forward
Shift+RIGHT  no-osd seek -5 exact       # seek exactly 5 seconds backward
Ctrl+LEFT    no-osd seek 10 exact       # seek exactly 10 seconds forward
Ctrl+RIGHT  no-osd seek -10 exact       # seek exactly 10 seconds backward


WHEEL_UP      add volume 2
WHEEL_DOWN    add volume -2
Ctrl+WHEEL_UP no-osd seek 1 exact                       # skip to the next file
Meta+WHEEL_UP no-osd seek 5 exact                        # skip to the next file
### Uncomment these two lines if not using smart_seek_back_playlist.lua
# Ctrl+WHEEL_DOWN no-osd seek -1 exact                        # skip to the next file
# Meta+WHEEL_DOWN no-osd seek -5 exact                        # skip to the next file

WHEEL_LEFT script-binding cursor-centric-zoom 0.1
WHEEL_RIGHT script-binding cursor-centric-zoom -0.1
Ctrl+WHEEL_LEFT multiply speed 1/1.01                 # decrease the playback speed
Ctrl+WHEEL_RIGHT multiply speed 1.01                   # increase the playback speed

[ frame-step                           # advance one frame and pause
/ frame-back-step                      # go back by one frame and pause

Alt+KP1 repeatable add video-rotate -1 # rotate video counterclockwise by 1 degree
Alt+KP5 set video-rotate  0 # reset rotation
Alt+KP3 repeatable add video-rotate  1 # rotate video clockwise by 1 degree
KP4 repeatable add video-rotate -1 # rotate video counterclockwise by 1 degree
Ctrl+KP5 set video-rotate  0 # reset rotation
KP6 repeatable add video-rotate  1 # rotate video clockwise by 1 degree
# Shift+BS revert-seek                   # undo the previous (or marked) seek
# Shift+Ctrl+BS revert-seek mark         # mark the position for revert-seek

q ignore 
Q quit-watch-later                     # exit and remember the playback position
9 add hue -1
0 add hue 1

#SPACE cycle pause                      # toggle pause/playback mode

###################################################
j playlist-next
k playlist-prev
Meta+Ctrl+WHEEL_DOWN playlist-next                        # skip to the previous file
Meta+Ctrl+WHEEL_UP playlist-prev                        # skip to the next file
# Meta+Ctrl+WHEEL_UP ignore                      # skip to the previous file
# Meta+Ctrl+WHEEL_DOWN ignore                        # skip to the next file
Alt+RIGHT playlist-next                        # skip to the next file
Alt+LEFT playlist-prev                        # skip to the next file
MBTN9 repeatable playlist-next                        # skip to the next file
MBTN10 repeatable playlist-prev                        # skip to the next file
# ENTER playlist-next                    # skip to the next file
KP_SUBTRACT script-binding ab-loop-set-a                  # set ab-loop a point
KP_ADD script-binding ab-loop-set-b                  # set ab-loop b point
KP_ENTER script-binding ab-loop-clear                 # set ab-loop b point
# ENTER ab-loop                  # set/clear A-B loop points


###################################################
# tab  script-binding uosc/toggle-ui

# Playlist-view script bindings
g script-message playlist-view-toggle
MBTN_MID script-message playlist-view-toggle

# Equalizer script bindings
- script-message equalizer-toggle
# MBTN_MID_DBL script-message equalizer-toggle

# Backspace to reset video filters and pan/zoom back to defaults.
BS script-message equalizer-reset; set video-zoom 0.0; set video-pan-x 0.0; set video-pan-y 0.0; show-text "Video set to defaults"
Shift+BS set speed 1.0                       # reset the speed to normal
### Uncomment this line if equalizer script not installed.
# BS set contrast 0; set brightness 0; set gamma 0; set saturation 0; set hue 0; set video-zoom 0.0; set video-pan-x 0.0; set video-pan-y 0.0; show-text "Video set to defaults"

