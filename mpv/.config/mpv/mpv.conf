
############################################
# Video Settings
############################################
vo=gpu-next
# tone-mapping=st2094-40
### Hardware Decoding
# hwdec=yes

### Enabling this can sometimes fix freezes/glitches if using hwdec
# gpu-context=wayland

### Nvidia drivers on linux sometimes have issues decoding using Vulcan, so forcing gpu-api to use OpenGL can help in certain situations
# gpu-api=opengl

# profile=high-quality
# profile=gpu-hq


# ## my tscale config
