# interpolation=yes
# scale=catmull_rom
# tscale=catmull_rom
# deband=yes 

############################################
# Audio Settings
############################################

# ao=pipewire
volume=50

### Audio normdlization
# af=lavfi=[loudnorm=I=-14:LRA=1:tp=-1]


#### Audio normdlization testing:
# af=lavfi=[dynaudnorm=f=75:g=25:p=0.55]
# af=lavfi=[loudnorm=I=-16:TP=-3:LRA=4] # from a random reddit enjoyer


############################################
# Window Settings
############################################

### Settings for Wayland
force-window=yes
window-dragging=no
auto-window-resize=no
keepaspect-window=no
# hidpi-window-scale=yes

############################################
# Playback
############################################

loop=yes
loop-playlist=inf
image-display-duration=6
reset-on-next-file=video-pan-x,video-pan-y,panscan,video-align-x,video-align-y,video-rotate,video-zoom,ab-loop-a,ab-loop-b,speed
# reset-on-next-file=video-pan-x,video-pan-y,panscan,video-align-x,video-align-y,video-rotate,video-zoom,ab-loop-a,ab-loop-b,brightness,contrast,gamma,saturation,hue

############################################
# General
############################################

screenshot-directory=~/Pictures/mpv-screenshots

############################################
# Profiles
############################################

[input-test]
loop=yes
input-test
force-window
idle

[audio-only]
profile-cond=(filename:match"%.mp3$" or filename:match"%.wav$") ~= nil
profile-restore=copy
af=
volume=100

[HDR]
profile-cond=p["video-params/gamma"] == "pq"
profile-restore=copy
tone-mapping=bt.2446a
gamut-mapping-mode=auto
hdr-compute-peak=yes
target-peak=100
target-trc=bt.1886
target-prim=bt.2020
